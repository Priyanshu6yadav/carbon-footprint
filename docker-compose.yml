version: "3.9"

# NOTE: This compose file is for LOCAL DEVELOPMENT only.
# For production, use docker-compose.prod.yml.
# DB passwords should be sourced from environment variables or secrets management.

services:
  postgres:
    image: postgres:16-alpine
    container_name: carbontrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carbontrack
      # IMPORTANT: Change this in production — use POSTGRES_PASSWORD env var or Docker secrets
      POSTGRES_PASSWORD: password
      POSTGRES_DB: carbontrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbontrack -d carbontrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carbontrack_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbontrack_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://carbontrack:password@postgres:5432/carbontrack
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Dev-only: mounts source code for hot-reloading
    volumes:
      - ./backend:/app
    # NOTE: --reload is development-only; production uses docker-compose.prod.yml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbontrack_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    # Dev-only: mounts source code for HMR
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
